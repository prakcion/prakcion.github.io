<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --ink: #1a1a18;
      --paper: #f7f6f2;
      --dim: #9a9890;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--paper);
      color: var(--ink);
      font-family: 'Cormorant', Georgia, serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 3rem;
    }

    main {
      max-width: 480px;
      opacity: 0;
      transform: translateY(10px);
      animation: arrive 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards;
    }

    @keyframes arrive {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .rule {
      width: 32px;
      height: 1px;
      background: var(--ink);
      margin-bottom: 2.5rem;
    }

    h1 {
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 300;
      font-style: italic;
      line-height: 1.35;
      letter-spacing: 0.01em;
      margin-bottom: 1.75rem;
      color: var(--ink);
    }

    p {
      font-size: clamp(0.95rem, 2vw, 1.1rem);
      font-weight: 300;
      line-height: 1.7;
      color: var(--dim);
      letter-spacing: 0.02em;
    }

    p + p {
      margin-top: 1rem;
    }

    @media (max-width: 480px) {
      body {
        align-items: flex-start;
        padding-top: 5rem;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="rule"></div>
    <h1>Under construction isn't quite right.</h1>
    <p>This space is being considered carefully. Something worth reading will be here when it's ready.</p>
    <p>In the meantime — nothing to see, and that's intentional.</p>
  </main>
</body>
</html>
